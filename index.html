function loadNews() {
    const container = document.getElementById('news-container');
    container.innerHTML = articles.map(a => `
        <div class="card">
            <div class="news-thumb" style="background-image:url('${a.img}?auto=format&fit=crop&w=800')"></div>
            <div class="card-content">
                <span class="card-tag">${a.tag}</span>
                <h3 class="card-title">${a.title}</h3>
                <p class="card-summary">${a.sum}</p>
                <div class="read-more" onclick="toggleText(this)">Full Technical Analysis +</div>
                <div class="card-text">${a.text}</div>
            </div>
        </div>
    `).join('');
}

function toggleText(btn) {
    const text = btn.nextElementSibling;
    const isVisible = text.style.display === "block";
    text.style.display = isVisible ? "none" : "block";
    btn.innerHTML = isVisible ? "Full Technical Analysis +" : "Close Analysis -";
}

function showSection(id) {
    document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo({top: 0, behavior: 'smooth'});
}

window.onload = function() {
    loadNews();
    new TradingView.widget({ "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "D", "theme": "dark", "container_id": "tv_main_chart" });
};
